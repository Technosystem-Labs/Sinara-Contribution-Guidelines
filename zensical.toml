[project]
site_name = "Sinara Contribution Guidelines"
site_url = "https://technosystem-labs.github.io/Sinara-Contribution-Guidelines/"
repo_url = "https://github.com/Technosystem-Labs/Sinara-Contribution-Guidelines"
repo_name = "Technosystem-Labs/Sinara-Contribution-Guidelines"
edit_uri = "edit/main/docs/"

nav = [
  { "Home" = "index.md" },
  { "Repository Structure" = "repo.md" },
  { "Electronics Design" = "electronics.md" },
  { "Mechanics" = "mechanics.md" },
  { "Sinara DIOT" = "sinara-diot.md" },
  { "Sinara IDC" = "sinara-idc.md" },
]

[project.theme]
variant = "classic"
language = "en"
features = [
  "navigation.instant",
  "navigation.tracking",
  "navigation.top",
  "search.suggest",
  "search.highlight",
  "content.action.edit",
  "content.code.copy",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]
